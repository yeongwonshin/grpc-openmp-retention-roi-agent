services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - retention_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: retention_db
      POSTGRES_USER: retention_user
      POSTGRES_PASSWORD: retention_password
      TZ: Asia/Seoul
    ports:
      - "5432:5432"
    volumes:
      - retention_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U retention_user -d retention_db"]
      interval: 5s
      timeout: 3s
      retries: 30
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  feature-worker:
    build:
      context: .
      dockerfile: Dockerfile.api
    restart: unless-stopped
    command:
      [
        "python",
        "-m",
        "src.distributed.feature_worker",
        "--host",
        "0.0.0.0",
        "--port",
        "50051",
        "--max-workers",
        "4"
      ]
    environment:
      PYTHONPATH: /app
      TZ: Asia/Seoul
    expose:
      - "50051"
    volumes:
      - .:/app
    stop_grace_period: 20s
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import socket; s=socket.create_connection(('127.0.0.1',50051),3); s.close()\""]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 512M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  roi-worker:
    build:
      context: .
      dockerfile: Dockerfile.api
    restart: unless-stopped
    command:
      [
        "bash",
        "-lc",
        "./scripts/build_openmp_roi.sh && python -m src.distributed.roi_worker --host 0.0.0.0 --port 50052 --max-workers 4"
      ]
    environment:
      PYTHONPATH: /app
      TZ: Asia/Seoul
      OMP_NUM_THREADS: "4"
      OMP_PROC_BIND: "false"
    expose:
      - "50052"
    volumes:
      - .:/app
    stop_grace_period: 30s
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import socket; s=socket.create_connection(('127.0.0.1',50052),3); s.close()\""]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 3G
        reservations:
          memory: 1G
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      feature-worker:
        condition: service_healthy
      roi-worker:
        condition: service_healthy
    environment:
      RETENTION_API_HOST: 0.0.0.0
      RETENTION_API_PORT: 8000
      RETENTION_API_DATA_DIR: data/raw
      RETENTION_MODEL_DIR: models
      RETENTION_RESULT_DIR: results
      RETENTION_REDIS_URL: redis://redis:6379/0
      RETENTION_CACHE_TTL_SECONDS: "20"
      RETENTION_CACHE_PREFIX: retention-cache
      RETENTION_USER_DB_URL: postgresql+psycopg://retention_user:retention_password@postgres:5432/retention_db
      RETENTION_DISTRIBUTED_ENGINE: "on"
      RETENTION_FEATURE_WORKER_ADDRESS: feature-worker:50051
      RETENTION_ROI_WORKER_ADDRESS: roi-worker:50052
      RETENTION_OPENMP_THREADS: "4"
      RETENTION_GRPC_TIMEOUT_SECONDS: "180"
      PYTHONPATH: /app
      TZ: Asia/Seoul
    expose:
      - "8000"
    volumes:
      - .:/app
    stop_grace_period: 30s
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3).read()\""
        ]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 4G
        reservations:
          memory: 1G
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  api-lb:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/nginx.conf:ro
    stop_grace_period: 10s
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8000/health >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 20s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  dashboard:
    build:
      context: .
      dockerfile: Dockerfile.dashboard
    restart: unless-stopped
    depends_on:
      api-lb:
        condition: service_healthy
    environment:
      RETENTION_API_BASE_URL: http://api-lb:8000
      RETENTION_REDIS_URL: redis://redis:6379/0
      RETENTION_CACHE_TTL_SECONDS: "20"
      PYTHONPATH: /app
      TZ: Asia/Seoul
      STREAMLIT_SERVER_MAX_UPLOAD_SIZE: "1024"
      STREAMLIT_SERVER_MAX_MESSAGE_SIZE: "512"
      STREAMLIT_SERVER_FILE_WATCHER_TYPE: "none"
      STREAMLIT_BROWSER_GATHER_USAGE_STATS: "false"
    ports:
      - "8501:8501"
    volumes:
      - .:/app
    stop_grace_period: 30s
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8501/_stcore/health', timeout=3).read()\""
        ]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 6G
        reservations:
          memory: 2G
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  retention_postgres_data:
  retention_redis_data: